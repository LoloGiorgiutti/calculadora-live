/* ── MUNDIAL special case: compute days to Jun 11 2026 ─────── */
function mundialDays() {
  var target = new Date('2026-06-11T20:00:00-06:00'); /* Mexico City kick-off */
  var diff = target - new Date();
  if (diff < 0) return { state: 'past' };
  return { state: 'future', days: Math.ceil(diff / 86400000) };
}

/* ── CARD RENDERER ───────────────────────────────────────────── */
function cardHTML(ev, cardData) {
  var daysHtml;
  if (cardData.state === 'unknown') {
    daysHtml = '<div class="cd-card-unknown">📅 Por confirmar</div>';
  } else if (cardData.state === 'past') {
    daysHtml = '<div class="cd-card-past">✓ Ya ocurrió</div>';
  } else if (cardData.state === 'today') {
    daysHtml = '<div class="cd-card-today">¡Hoy!</div>';
  } else {
    daysHtml = '<div class="cd-card-days">' + cardData.days + '</div>'
             + '<div class="cd-card-days-lbl">' + (cardData.days === 1 ? 'día' : 'días') + '</div>';
  }
  var extBadge = ev.type === '_ext' ? '<span class="cd-card-ext">↗</span>' : '';
  return '<a href="' + ev.url + '" class="cd-card">'
    + extBadge
    + '<div class="cd-card-emoji">' + ev.emoji + '</div>'
    + '<div class="cd-card-name">' + ev.name + '</div>'
    + daysHtml
    + '</a>';
}

/* ── BUILD HUB ───────────────────────────────────────────────── */
function buildHub(allCardData) {
  var html = '';
  SECTIONS.forEach(function(section) {
    html += '<div class="cd-section-hdr">' + section.label + '</div>';
    html += '<div class="cd-cards">';
    section.events.forEach(function(ev) {
      var cardData = allCardData[ev.slug] || { state: 'unknown' };
      html += cardHTML(ev, cardData);
    });
    html += '</div>';
  });
  document.getElementById('hub-body').innerHTML = html;
}

/* ── LOAD ALL CARD DATA ──────────────────────────────────────── */
(function() {
  var allEvents = [];
  SECTIONS.forEach(function(s) { allEvents = allEvents.concat(s.events); });

  var results = {};
  var pending = 0;

  /* Mundial special */
  results['mundial'] = mundialDays();

  allEvents.forEach(function(ev) {
    if (ev.type === '_ext') return; /* mundial handled above */
    pending++;
    CountdownEngine.getCardData(ev, function(data) {
      results[ev.slug] = data;
      pending--;
      if (pending === 0) buildHub(results);
    });
  });

  if (pending === 0) buildHub(results);
})();
