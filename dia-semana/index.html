<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Qué Día de la Semana Fue? | Calculadora de Fecha — Calculadora.live</title>
<meta name="description" content="Ingresá cualquier fecha y descubrí qué día de la semana fue o será. También muestra el número de semana, día del año y más.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://calculadora.live/dia-semana">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F0F2F7;--surface:#FFF;--ink:#080A12;--ink-light:#60647A;--ink-faint:#B4B8CC;--hi:#1A5FE8;--hi-soft:#EEF3FD;--border:#D4D8E6;--radius:16px;--radius-sm:10px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{font-size:18px;font-weight:700;color:var(--ink);text-decoration:none;letter-spacing:-0.02em}.logo span{color:var(--hi)}
  .back-link{font-size:13px;color:var(--ink-light);text-decoration:none}.back-link:hover{color:var(--hi)}
  .page{max-width:520px;margin:0 auto;padding:36px 20px 60px}
  .page-icon{font-size:36px;margin-bottom:10px}
  .page-title{font-size:26px;font-weight:700;letter-spacing:-0.03em;margin-bottom:6px}
  .page-sub{font-size:14px;color:var(--ink-light);line-height:1.5;margin-bottom:28px}
  .card{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid var(--border)}
  .field{margin-bottom:0}
  label{display:block;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-light);margin-bottom:8px}
  input[type=date]{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:16px;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s;cursor:pointer}
  input[type=date]:focus{border-color:var(--hi)}
  .result-card{background:#0C1528;border-radius:var(--radius);padding:28px;margin-bottom:16px;border-top:3px solid var(--hi)}
  .result-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:6px}
  .result-main{font-size:52px;font-weight:700;color:white;letter-spacing:-0.03em;line-height:1;margin-bottom:6px}
  .result-date{font-size:16px;color:rgba(255,255,255,0.5);margin-bottom:20px;font-weight:400}
  .result-rows{border-top:1px solid rgba(255,255,255,0.1);padding-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat-box{background:rgba(255,255,255,0.05);border-radius:10px;padding:14px}
  .stat-val{font-size:20px;font-weight:700;color:white;letter-spacing:-0.02em}
  .stat-lbl{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px}
  .weekend-tag{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px;margin-left:8px;vertical-align:middle}
  .weekend-tag.fin{background:rgba(134,239,172,0.15);color:#86EFAC}
  .weekend-tag.habil{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4)}
  .empty-state{color:rgba(255,255,255,0.3);font-size:15px}
  /* Day grid */
  .day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.1)}
  .day-cell{text-align:center;padding:8px 0;border-radius:8px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.3)}
  .day-cell.active{background:var(--hi);color:white}
  .day-cell.weekend{color:rgba(255,255,255,0.2)}
  .day-cell-name{font-size:9px;font-weight:400;color:rgba(255,255,255,0.2);margin-top:2px}
  .day-cell.active .day-cell-name{color:rgba(255,255,255,0.7)}
</style>
</head>
<body>
<header>
  <a class="logo" href="/">Calculadora<span>.live</span></a>
  <a class="back-link" href="/">← Volver</a>
</header>
<div class="page">
  <div class="page-icon">📆</div>
  <h1 class="page-title">¿Qué día fue?</h1>
  <p class="page-sub">Ingresá una fecha y descubrí qué día de la semana fue o será.</p>

  <div class="card">
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="fecha" oninput="calcular()">
    </div>
  </div>

  <div class="result-card">
    <div class="result-eyebrow">Día de la semana</div>
    <div id="result-main" class="result-main"><span class="empty-state">Seleccioná una fecha</span></div>
    <div id="result-date" class="result-date"></div>
    <div id="result-rows" class="result-rows" style="display:none">
      <div class="stat-box">
        <div class="stat-val" id="r-semana">—</div>
        <div class="stat-lbl">Semana del año</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="r-dia-anio">—</div>
        <div class="stat-lbl">Día del año</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="r-dias-hoy">—</div>
        <div class="stat-lbl" id="r-dias-hoy-lbl">Días desde hoy</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="r-trimestre">—</div>
        <div class="stat-lbl">Trimestre</div>
      </div>
    </div>
    <div id="day-grid" class="day-grid" style="display:none"></div>
  </div>
</div>
<script>
  const dias    = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const diasCorto = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses   = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  // Pre-load today
  const hoy = new Date();
  document.getElementById('fecha').value = hoy.toISOString().split('T')[0];
  calcular();

  function getWeekNumber(d){
    const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    const dayNum=date.getUTCDay()||7;
    date.setUTCDate(date.getUTCDate()+4-dayNum);
    const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
    return Math.ceil((((date-yearStart)/86400000)+1)/7);
  }

  function getDayOfYear(d){
    const start=new Date(d.getFullYear(),0,0);
    const diff=d-start;
    return Math.floor(diff/86400000);
  }

  function calcular(){
    const val=document.getElementById('fecha').value;
    const mainEl=document.getElementById('result-main');
    const dateEl=document.getElementById('result-date');
    const rowsEl=document.getElementById('result-rows');
    const gridEl=document.getElementById('day-grid');

    if(!val){
      mainEl.innerHTML='<span class="empty-state">Seleccioná una fecha</span>';
      dateEl.textContent='';rowsEl.style.display='none';gridEl.style.display='none';return;
    }

    // Parse in local time
    const parts=val.split('-');
    const fecha=new Date(+parts[0],+parts[1]-1,+parts[2]);
    const dow=fecha.getDay(); // 0=Dom
    const esFinDeSemana=(dow===0||dow===6);
    const semana=getWeekNumber(fecha);
    const diaAnio=getDayOfYear(fecha);
    const trimestre=Math.ceil((fecha.getMonth()+1)/3);
    const hoyMidnight=new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate());
    const diffDias=Math.round((fecha-hoyMidnight)/86400000);
    const tag=esFinDeSemana?'Fin de semana':'Día hábil';
    const tagClass=esFinDeSemana?'fin':'habil';

    mainEl.innerHTML=`${dias[dow]}<span class="weekend-tag ${tagClass}">${tag}</span>`;
    dateEl.textContent=`${fecha.getDate()} de ${meses[fecha.getMonth()]} de ${fecha.getFullYear()}`;
    rowsEl.style.display='grid';
    gridEl.style.display='grid';

    document.getElementById('r-semana').textContent='N° '+semana;
    document.getElementById('r-dia-anio').textContent='N° '+diaAnio;
    const diasHoyEl=document.getElementById('r-dias-hoy');
    const diasHoyLbl=document.getElementById('r-dias-hoy-lbl');
    if(diffDias===0){diasHoyEl.textContent='Hoy';diasHoyLbl.textContent='Es hoy';}
    else if(diffDias>0){diasHoyEl.textContent='En '+diffDias;diasHoyLbl.textContent='Días desde hoy';}
    else{diasHoyEl.textContent='Hace '+Math.abs(diffDias);diasHoyLbl.textContent='Días atrás';}
    document.getElementById('r-trimestre').textContent='Q'+trimestre;

    // Day grid (Mon-Sun layout)
    const gridOrder=[1,2,3,4,5,6,0]; // Lun..Dom
    gridEl.innerHTML=gridOrder.map(d=>{
      const isActive=d===dow;
      const isWknd=(d===0||d===6);
      return `<div class="day-cell${isActive?' active':''}${!isActive&&isWknd?' weekend':''}">
        ${diasCorto[d]}
      </div>`;
    }).join('');
  }
</script>
</body>
</html>
