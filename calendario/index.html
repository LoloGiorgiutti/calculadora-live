<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9523976383161076" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario — Calculadora.live</title>
<meta name="description" content="Calendario mensual y anual navegable. Visualizá el mes actual, la vista del año completo, y conocé datos de cada día.">
<link rel="canonical" href="https://calculadora.live/calendario/">
<meta property="og:title" content="Calendario — Calculadora.live">
<meta property="og:description" content="Calendario mensual y anual navegable con datos de cada día.">
<meta property="og:url" content="https://calculadora.live/calendario/">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--ink:#0A0E1A;--ink-2:#363B4F;--ink-3:#858AA0;--line:#E4E7EE;--line-2:#EFF1F6;--accent:#4F6BFF;--accent-soft:#EEF1FF;--dark:#0A0E1A;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

header{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;display:flex;align-items:center;height:58px;padding:0 20px}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:var(--ink)}
.logo span{color:var(--accent)}

.hero{background:var(--dark);color:#fff;padding:28px 20px 24px;text-align:center}
.breadcrumb{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);margin-bottom:14px;letter-spacing:.03em}
.breadcrumb a{color:rgba(255,255,255,.4)}
.breadcrumb a:hover{color:rgba(255,255,255,.7)}
h1{font-size:clamp(22px,4vw,30px);font-weight:700;letter-spacing:-0.03em;margin-bottom:6px}
.hero-sub{font-size:14px;color:rgba(255,255,255,.55)}

.main{max-width:660px;margin:0 auto;padding:28px 20px 80px}

/* Toggle vista */
.view-toggle{display:flex;background:var(--surface);border:1.5px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:20px;width:fit-content}
.view-toggle button{padding:8px 20px;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer;transition:all .15s}
.view-toggle button.active{background:var(--accent);color:#fff}

/* Navegación */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-nav-title{font-size:20px;font-weight:700;letter-spacing:-0.02em;color:var(--ink)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-btn{width:36px;height:36px;border:1.5px solid var(--line);background:var(--surface);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-3);transition:all .15s;font-size:16px}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.today-btn{padding:7px 14px;border:1.5px solid var(--line);background:var(--surface);border-radius:9px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--ink-3);transition:all .15s}
.today-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── VISTA MENSUAL ── */
.cal-wrap{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:20px}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line-2)}
.cal-head div{padding:10px 0;text-align:center;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
/* Domingo es la última columna (col 7) en vista lunes-primero */
.cal-head div:last-child{color:#E53E3E}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:64px;padding:8px 10px;border-right:1px solid var(--line-2);border-bottom:1px solid var(--line-2);cursor:pointer;transition:background .12s;display:flex;flex-direction:column;gap:3px}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover{background:var(--accent-soft)}
.cal-day.other-month{background:#FAFBFD}
.cal-day.other-month .day-num{color:var(--line)}
.cal-day.today{background:var(--accent-soft)}
.cal-day.today .day-num{background:var(--accent);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-day.selected{background:var(--accent-soft);outline:2px solid var(--accent);outline-offset:-2px}
.cal-day.sunday:not(.other-month) .day-num{color:#E53E3E}
.day-num{font-size:13px;font-weight:600;color:var(--ink);width:26px;height:26px;display:flex;align-items:center;justify-content:center}

/* Info del día */
.day-info{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:20px 24px;margin-bottom:20px}
.di-title{font-size:16px;font-weight:700;letter-spacing:-0.02em;margin-bottom:16px;color:var(--ink)}
.di-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.di-item{background:var(--bg);border-radius:8px;padding:12px 14px}
.di-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin-bottom:3px}
.di-val{font-size:14px;font-weight:600;color:var(--ink)}

/* ── VISTA ANUAL ── */
#view-year{display:none}
.year-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.year-nav-title{font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--ink)}

.year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

.mini-cal{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:default}
.mini-cal-head{padding:10px 14px 8px;border-bottom:1px solid var(--line-2)}
.mini-cal-title{font-size:13px;font-weight:700;color:var(--ink);cursor:pointer}
.mini-cal-title:hover{color:var(--accent)}
.mini-cal-dow{display:grid;grid-template-columns:repeat(7,1fr);padding:4px 6px 2px}
.mini-cal-dow span{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--ink-3);text-align:center;letter-spacing:.04em}
.mini-cal-dow span:last-child{color:#E53E3E}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:2px 6px 8px;gap:1px}
.mini-day{font-size:11px;font-weight:500;color:var(--ink-2);text-align:center;padding:3px 0;border-radius:4px;cursor:pointer;transition:background .1s}
.mini-day:hover{background:var(--accent-soft);color:var(--accent)}
.mini-day.other{color:var(--line)}
.mini-day.today-dot{background:var(--accent);color:#fff;border-radius:50%;font-weight:700}
.mini-day.sunday-col{color:#E53E3E}
.mini-day.sunday-col.today-dot{color:#fff}
.mini-day.other.sunday-col{color:#f5b8b8}

@media(max-width:560px){
  .year-grid{grid-template-columns:repeat(2,1fr);gap:10px}
}
@media(max-width:380px){
  .year-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .cal-day{min-height:44px;padding:5px 4px}
  .cal-head div{font-size:10px;padding:8px 0}
  .day-num{font-size:12px;width:22px;height:22px}
  .cal-day.today .day-num{width:22px;height:22px}
  .di-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <a href="/" class="logo">Calculadora<span>.live</span></a>
</header>

<div class="hero">
  <div class="breadcrumb"><a href="/">Inicio</a> / <a href="/fechas/">Fechas</a> / Calendario</div>
  <h1>Calendario</h1>
  <p class="hero-sub">Vista mensual y anual · Datos de cada día</p>
</div>

<div class="main">

  <!-- Toggle mes / año -->
  <div class="view-toggle">
    <button id="btn-mes" class="active" onclick="setView('mes')">Mes</button>
    <button id="btn-year" onclick="setView('year')">Año</button>
  </div>

  <!-- ══ VISTA MENSUAL ══ -->
  <div id="view-mes">
    <div class="cal-nav">
      <button class="nav-btn" onclick="cambiarMes(-1)">&#8249;</button>
      <div class="nav-right">
        <span class="cal-nav-title" id="nav-title"></span>
        <button class="today-btn" onclick="irHoy()">Hoy</button>
      </div>
      <button class="nav-btn" onclick="cambiarMes(1)">&#8250;</button>
    </div>

    <div class="cal-wrap">
      <div class="cal-head">
        <div>Lun</div><div>Mar</div><div>Mié</div>
        <div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="day-info" id="day-info" style="display:none">
      <div class="di-title" id="di-title"></div>
      <div class="di-grid" id="di-grid"></div>
    </div>
  </div>

  <!-- ══ VISTA ANUAL ══ -->
  <div id="view-year">
    <div class="year-nav">
      <button class="nav-btn" onclick="cambiarYear(-1)">&#8249;</button>
      <span class="year-nav-title" id="year-title"></span>
      <button class="nav-btn" onclick="cambiarYear(1)">&#8250;</button>
    </div>
    <div class="year-grid" id="year-grid"></div>
  </div>

</div>

<script src="/nav.js"></script>
<script>
var DIAS_LARGO = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
var MESES_LARGO = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

var hoy = new Date();
var curYear  = hoy.getFullYear();
var curMonth = hoy.getMonth();
var viewYear = hoy.getFullYear(); // año para vista anual
var currentView = 'mes';

function isLeap(y){ return (y%4===0 && y%100!==0) || y%400===0; }
function daysInMonth(m,y){ return [31,isLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31][m]; }

function weekOfYear(d){
  // ISO week: semana empieza lunes
  var tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var dayNum = tmp.getUTCDay() || 7;
  tmp.setUTCDate(tmp.getUTCDate() + 4 - dayNum);
  var yearStart = new Date(Date.UTC(tmp.getUTCFullYear(),0,1));
  return Math.ceil((((tmp - yearStart) / 86400000) + 1)/7);
}
function dayOfYear(d){
  return Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000);
}

// Convierte getDay() (Dom=0) a columna lunes-primero (Lun=0 … Dom=6)
function monFirst(dow){ return (dow + 6) % 7; }

/* ══ VISTA MES ══ */
function render(){
  document.getElementById('nav-title').textContent = MESES_LARGO[curMonth] + ' ' + curYear;

  var firstDow  = new Date(curYear, curMonth, 1).getDay(); // 0=Dom
  var firstCol  = monFirst(firstDow);                       // columna (0=Lun)
  var dias      = daysInMonth(curMonth, curYear);
  var prevDias  = daysInMonth(curMonth===0?11:curMonth-1, curMonth===0?curYear-1:curYear);

  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  var total = Math.ceil((firstCol + dias) / 7) * 7;

  for(var i=0; i<total; i++){
    var div = document.createElement('div');
    div.className = 'cal-day';

    var d, m, y, isOther = false;
    if(i < firstCol){
      d = prevDias - firstCol + i + 1;
      m = curMonth===0 ? 11 : curMonth-1;
      y = curMonth===0 ? curYear-1 : curYear;
      isOther = true;
    } else if(i >= firstCol + dias){
      d = i - firstCol - dias + 1;
      m = curMonth===11 ? 0 : curMonth+1;
      y = curMonth===11 ? curYear+1 : curYear;
      isOther = true;
    } else {
      d = i - firstCol + 1;
      m = curMonth;
      y = curYear;
    }

    var dayDate = new Date(y, m, d);
    var dow = dayDate.getDay(); // 0=Dom, 6=Sáb

    if(isOther) div.classList.add('other-month');
    if(dow === 0) div.classList.add('sunday'); // domingo → rojo

    var isToday = !isOther && d===hoy.getDate() && m===hoy.getMonth() && y===hoy.getFullYear();
    if(isToday) div.classList.add('today');

    var numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    div.appendChild(numEl);

    (function(dd,mm,yy){
      div.addEventListener('click', function(){ selectDay(dd,mm,yy); });
    })(d,m,y);

    grid.appendChild(div);
  }
}

function selectDay(d,m,y){
  // Limpiar selected previo
  var prev = document.querySelector('.cal-day.selected');
  if(prev) prev.classList.remove('selected');

  // Highlight
  var cells = document.querySelectorAll('.cal-day');
  cells.forEach(function(cell){
    var num = cell.querySelector('.day-num');
    if(!num) return;
    if(!cell.classList.contains('other-month') && parseInt(num.textContent)===d){
      cell.classList.add('selected');
    }
  });

  var dayDate = new Date(y,m,d);
  var dow = dayDate.getDay();
  document.getElementById('di-title').textContent =
    DIAS_LARGO[dow] + ' ' + d + ' de ' + MESES_LARGO[m] + ' de ' + y;

  var doy  = dayOfYear(dayDate);
  var woy  = weekOfYear(dayDate);
  var totalDays = 365 + (isLeap(y)?1:0);
  var daysLeft = totalDays - doy;
  var hoyMid   = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
  var daysFrom = Math.round((dayDate - hoyMid) / 86400000);

  var fromText;
  if(daysFrom === 0) fromText = 'Hoy';
  else if(daysFrom === 1) fromText = 'Mañana';
  else if(daysFrom === -1) fromText = 'Ayer';
  else if(daysFrom > 0) fromText = 'En ' + daysFrom + ' días';
  else fromText = 'Hace ' + Math.abs(daysFrom) + ' días';

  document.getElementById('di-grid').innerHTML =
    diItem('Día del año', doy + ' / ' + totalDays) +
    diItem('Semana ISO', woy) +
    diItem('Días restantes', daysLeft) +
    diItem('Desde hoy', fromText);

  document.getElementById('day-info').style.display = 'block';
}

function diItem(l,v){
  return '<div class="di-item"><div class="di-label">'+l+'</div><div class="di-val">'+v+'</div></div>';
}

function cambiarMes(delta){
  curMonth += delta;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  document.getElementById('day-info').style.display='none';
  render();
}

function irHoy(){
  curYear  = hoy.getFullYear();
  curMonth = hoy.getMonth();
  document.getElementById('day-info').style.display='none';
  render();
  setView('mes');
}

/* ══ VISTA ANUAL ══ */
function renderYear(){
  document.getElementById('year-title').textContent = viewYear;
  var grid = document.getElementById('year-grid');
  grid.innerHTML = '';

  for(var mo=0; mo<12; mo++){
    grid.appendChild(buildMiniCal(mo, viewYear));
  }
}

function buildMiniCal(mo, yr){
  var wrap = document.createElement('div');
  wrap.className = 'mini-cal';

  // Cabecera con nombre del mes
  var head = document.createElement('div');
  head.className = 'mini-cal-head';
  var title = document.createElement('div');
  title.className = 'mini-cal-title';
  title.textContent = MESES_LARGO[mo];
  (function(m,y){
    title.addEventListener('click', function(){
      curMonth = m; curYear = y;
      setView('mes');
    });
  })(mo, yr);
  head.appendChild(title);
  wrap.appendChild(head);

  // Cabecera días
  var dowRow = document.createElement('div');
  dowRow.className = 'mini-cal-dow';
  ['L','M','X','J','V','S','D'].forEach(function(d){
    var s = document.createElement('span');
    s.textContent = d;
    dowRow.appendChild(s);
  });
  wrap.appendChild(dowRow);

  // Grid días
  var grd = document.createElement('div');
  grd.className = 'mini-cal-grid';

  var firstDow = new Date(yr, mo, 1).getDay();
  var firstCol = monFirst(firstDow);
  var dias     = daysInMonth(mo, yr);
  var prevDias = daysInMonth(mo===0?11:mo-1, mo===0?yr-1:yr);
  var total    = Math.ceil((firstCol + dias) / 7) * 7;

  for(var i=0; i<total; i++){
    var span = document.createElement('span');
    span.className = 'mini-day';
    var d, isOther = false;
    if(i < firstCol){
      d = prevDias - firstCol + i + 1;
      isOther = true;
    } else if(i >= firstCol + dias){
      d = i - firstCol - dias + 1;
      isOther = true;
    } else {
      d = i - firstCol + 1;
    }
    span.textContent = d;
    if(isOther){ span.classList.add('other'); }

    // Domingo = columna 6 (índice mod 7 === 6)
    if(i % 7 === 6 && !isOther) span.classList.add('sunday-col');

    // Hoy
    if(!isOther && d===hoy.getDate() && mo===hoy.getMonth() && yr===hoy.getFullYear()){
      span.classList.add('today-dot');
    }

    if(!isOther){
      (function(dd,mm,yy){
        span.addEventListener('click', function(){
          curMonth = mm; curYear = yy;
          setView('mes');
          // pequeño delay para dejar que render() ejecute primero
          setTimeout(function(){ selectDay(dd,mm,yy); }, 0);
        });
      })(d, mo, yr);
    }
    grd.appendChild(span);
  }
  wrap.appendChild(grd);
  return wrap;
}

function cambiarYear(delta){
  viewYear += delta;
  renderYear();
}

/* ══ TOGGLE VISTAS ══ */
function setView(v){
  currentView = v;
  document.getElementById('view-mes').style.display  = v==='mes'  ? '' : 'none';
  document.getElementById('view-year').style.display = v==='year' ? '' : 'none';
  document.getElementById('btn-mes').classList.toggle('active',  v==='mes');
  document.getElementById('btn-year').classList.toggle('active', v==='year');
  if(v==='year') renderYear();
  if(v==='mes')  render();
}

// Init
render();
</script>
</body>
</html>
