function getSigno(d) {
  var m = d.getMonth() + 1, day = d.getDate();
  for (var i = 0; i < SIGNOS.length; i++) {
    var s = SIGNOS[i];
    var [dm, dd] = s.desde, [hm, hd] = s.hasta;
    if (dm <= hm) {
      if ((m === dm && day >= dd) || (m === hm && day <= hd)) return s;
    } else {
      if ((m === dm && day >= dd) || (m === hm && day <= hd)) return s;
    }
  }
  return SIGNOS[0];
}

function calcular() {
  var val = document.getElementById('fecha').value;
  if (!val) { alert('Ingresá tu fecha de nacimiento'); return; }
  var d = new Date(val + 'T12:00:00');
  var s = getSigno(d);

  document.getElementById('r-symbol').textContent = s.sym;
  document.getElementById('r-name').textContent = s.n;
  document.getElementById('r-dates').textContent = s.n.toUpperCase() + ' · ' + formatRange(s.desde, s.hasta);

  document.getElementById('r-attrs').innerHTML =
    attr('Elemento', s.elemento) +
    attr('Planeta regente', s.planeta) +
    attr('Modalidad', s.modalidad) +
    attr('Polaridad', s.polaridad) +
    attr('Color', s.color) +
    attr('Piedra', s.piedra);

  document.getElementById('r-desc').textContent = s.desc;

  document.getElementById('r-traits').innerHTML =
    s.rasgos.map(function(r){ return '<span class="trait">' + r + '</span>'; }).join('');

  document.getElementById('r-compat').innerHTML =
    s.compat.map(function(sym){
      var match = SIGNOS.find(function(x){ return x.sym === sym; });
      return '<div class="compat-sign"><span>' + sym + '</span><span>' + (match ? match.n : sym) + '</span></div>';
    }).join('');

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
}

function attr(label, val) {
  return '<div class="attr"><div class="attr-label">' + label + '</div><div class="attr-value">' + val + '</div></div>';
}

var MESES = ['','enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function formatRange(desde, hasta) {
  return desde[1] + ' de ' + MESES[desde[0]] + ' — ' + hasta[1] + ' de ' + MESES[hasta[0]];
}

document.getElementById('fecha').addEventListener('keydown', function(e){ if(e.key==='Enter') calcular(); });
