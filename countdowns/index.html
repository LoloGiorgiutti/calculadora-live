/* ── MUNDIAL: special case ────────────────────────────────────── */
function mundialDays() {
  var target = new Date('2026-06-11T20:00:00-06:00');
  var diff = target - new Date();
  if (diff < 0) return { state: 'past' };
  var days = Math.ceil(diff / 86400000);
  return { state: days === 0 ? 'today' : 'future', days: days };
}

/* ── CARD HTML ───────────────────────────────────────────────── */
function cardHTML(ev, data) {
  var bottom;
  if (data.state === 'unknown') {
    bottom = '<span class="cd-card-unknown">Por confirmar</span>';
  } else if (data.state === 'past') {
    bottom = '<span class="cd-card-past">✓ Ya ocurrió</span>';
  } else if (data.state === 'today') {
    bottom = '<span class="cd-card-today">¡Hoy!</span>';
  } else {
    bottom = '<span class="cd-card-days">' + data.days + '</span>'
           + '<span class="cd-card-days-lbl">' + (data.days === 1 ? 'día' : 'días') + '</span>';
  }
  return '<a href="' + ev.url + '" class="cd-card">'
    + '<div class="cd-card-top">'
    + '<span class="cd-card-name">' + ev.name + '</span>'
    + '</div>'
    + bottom
    + '</a>';
}

/* ── BUILD HUB ───────────────────────────────────────────────── */
function buildHub(results) {
  var html = '';
  SECTIONS.forEach(function(section) {
    html += '<div class="cd-section-hdr">' + section.label + '</div><div class="cd-cards">';
    section.events.forEach(function(ev) {
      html += cardHTML(ev, results[ev.slug] || { state: 'unknown' });
    });
    html += '</div>';
  });
  document.getElementById('hub-body').innerHTML = html;
}

/* ── FETCH AND POPULATE ──────────────────────────────────────── */
(function() {
  var allEvents = [];
  SECTIONS.forEach(function(s) { allEvents = allEvents.concat(s.events); });

  var results = {};
  var pending = 0;

  /* Mundial hardcoded */
  results['mundial'] = mundialDays();

  allEvents.forEach(function(ev) {
    if (ev.type === '_ext') return;
    pending++;
    CountdownEngine.getCardData(ev, function(data) {
      results[ev.slug] = data;
      if (--pending === 0) buildHub(results);
    });
  });

  if (pending === 0) buildHub(results);
})();
</script>
