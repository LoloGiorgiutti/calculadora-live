<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📅 Calculadoras de Fechas — Calculadora.live</title>

<meta property="og:title" content="📅 Calculadoras de Fechas — Calculadora.live">

<meta property="og:url" content="https://calculadora.live/fechas/">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F0F2F7;--surface:#FFFFFF;--ink:#080A12;--ink-light:#60647A;--ink-faint:#B4B8CC;--hi:#1A5FE8;--hi-soft:#EEF3FD;--border:#D4D8E6;--radius:16px;--radius-sm:10px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
  .logo{font-size:18px;font-weight:700;color:var(--ink);text-decoration:none;letter-spacing:-0.02em;}
  .logo span{color:var(--hi);}
  .hero{text-align:center;padding:56px 24px 40px;max-width:640px;margin:0 auto;}
  .hero h1{font-size:clamp(22px,4.5vw,36px);font-weight:700;letter-spacing:-0.03em;line-height:1.2;margin-bottom:12px;text-wrap:balance;}
  .hero p{font-size:16px;color:var(--ink-light);line-height:1.5;}
  .container{max-width:900px;margin:0 auto;padding:0 20px 60px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
  .calc-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;text-decoration:none;color:var(--ink);display:flex;align-items:flex-start;gap:14px;transition:border-color .15s,box-shadow .15s,transform .15s;}
  .calc-card:hover{border-color:var(--hi);box-shadow:0 4px 20px rgba(26,95,232,.12);transform:translateY(-2px);}
  .calc-icon{font-size:28px;line-height:1;flex-shrink:0;}
  .calc-info{flex:1;}
  .calc-name{font-size:15px;font-weight:600;margin-bottom:3px;line-height:1.2;}
  .calc-desc{font-size:12px;color:var(--ink-light);line-height:1.4;}
  .badge-new{font-size:10px;font-weight:700;letter-spacing:.05em;background:var(--hi);color:white;padding:2px 7px;border-radius:99px;text-transform:uppercase;margin-left:6px;vertical-align:middle;}
  footer{text-align:center;padding:24px;font-size:12px;color:var(--ink-faint);border-top:1px solid var(--border);}
  @media(max-width:480px){.grid{grid-template-columns:1fr;}.hero{padding:36px 20px 28px;}}
</style>
</head>
<body>
<header>
  <a class="logo" href="/">Calculadora<span>.live</span></a>
</header>
<div class="hero">
  <h1>📅 Calculadoras de Fechas</h1>
  <p>Edad exacta, días entre fechas y día de la semana. Simples y precisas.</p>
</div>
<div class="container">
  <div id="cat-grid-root"></div>
</div>
<footer>© 2026 Calculadora.live · Herramientas gratuitas</footer>
<script src="/nav.js"></script>
</body>
</html>
